<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* MAIN IMAGE */
.world-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
  user-select: none;
  -webkit-user-drag: none;
}

/* ATMOSPHERE */
.vignette {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 42%, rgba(122,233,199,0.10), transparent 38%),
    radial-gradient(circle at 17% 48%, rgba(255,210,120,0.12), transparent 20%),
    linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.45));
}

.scanlines {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.12;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.06) 0px,
    rgba(255,255,255,0.06) 1px,
    transparent 2px,
    transparent 5px
  );
}

/* TOP UI */
.title-box {
  position: absolute;
  top: calc(24px + env(safe-area-inset-top));
  left: 24px;
  z-index: 10;
  width: min(70vw, 545px);
  padding: 28px 34px;
  border-radius: 34px;
  background: rgba(0,0,0,0.58);
  border: 1px solid rgba(122,233,199,0.32);
  box-shadow: 0 0 30px rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
}

.title-box h1 {
  font-size: clamp(2rem, 6vw, 3.1rem);
  letter-spacing: 0.34em;
  line-height: 1.25;
  font-weight: 900;
}

.title-box p {
  margin-top: 18px;
  font-size: clamp(1.3rem, 4vw, 2rem);
  letter-spacing: 0.16em;
  opacity: 0.9;
}

/* HAMBURGER */
.menu-button {
  position: absolute;
  top: calc(32px + env(safe-area-inset-top));
  right: 28px;
  z-index: 12;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 1px solid rgba(122,233,199,0.35);
  background: rgba(0,0,0,0.58);
  color: #effff9;
  font-size: 6rem;
  line-height: 1;
  display: grid;
  place-items: center;
  cursor: pointer;
  backdrop-filter: blur(4px);
  box-shadow: 0 0 28px rgba(0,0,0,0.55);
}

.menu-button:active {
  transform: scale(0.96);
}

/* DROPDOWN MENU */
.world-menu {
  position: absolute;
  top: calc(220px + env(safe-area-inset-top));
  right: 26px;
  z-index: 11;
  width: min(72vw, 390px);
  padding: 22px;
  border-radius: 30px;
  background: rgba(0,0,0,0.72);
  border: 1px solid rgba(122,233,199,0.35);
  backdrop-filter: blur(6px);
  display: none;
}

.world-menu.open {
  display: block;
}

.world-menu h2 {
  color: #a9f7dc;
  font-size: 2rem;
  letter-spacing: 0.25em;
  margin-bottom: 18px;
}

.world-menu a {
  display: block;
  color: #effff9;
  text-decoration: none;
  font-size: 1.35rem;
  padding: 16px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.world-menu a:last-child {
  border-bottom: none;
}

/* CLICKABLE WORLD ZONES */
.zone {
  position: absolute;
  z-index: 6;
  border-radius: 34px;
  cursor: pointer;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

.zone::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle at center, rgba(122,233,199,0.30), transparent 68%);
  border: 3px solid rgba(122,233,199,0);
  box-shadow: 0 0 0 rgba(122,233,199,0);
  opacity: 0;
  transition: opacity 0.25s ease, box-shadow 0.25s ease, border 0.25s ease;
}

.zone:hover::before,
.zone:active::before {
  opacity: 1;
  border: 3px solid rgba(122,233,199,0.65);
  box-shadow: 0 0 34px rgba(122,233,199,0.55);
}

/* TAP LABEL */
.zone span {
  position: absolute;
  left: 50%;
  bottom: -42px;
  transform: translateX(-50%);
  color: #effff9;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(122,233,199,0.32);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  opacity: 0;
  white-space: nowrap;
  transition: opacity 0.25s ease;
}

.zone:hover span,
.zone:active span {
  opacity: 1;
}

/* ZONE POSITIONS */
.tree-zone {
  top: 43%;
  left: 4%;
  width: 39%;
  height: 18%;
}

.bridge-zone {
  top: 25%;
  left: 28%;
  width: 46%;
  height: 17%;
}

.pixel-zone {
  top: 49%;
  right: 3%;
  width: 48%;
  height: 28%;
}

.daisy-zone {
  bottom: 3%;
  left: 25%;
  width: 38%;
  height: 26%;
}

.lj-zone {
  top: 59%;
  left: 0%;
  width: 29%;
  height: 21%;
}

/* MOBILE TUNING */
@media (max-width: 600px) {
  .title-box {
    top: 44px;
    left: 24px;
    width: 69vw;
    padding: 24px 28px;
  }

  .menu-button {
    top: 52px;
    right: 24px;
    width: 118px;
    height: 118px;
    font-size: 4rem;
  }

  .world-menu {
    top: 185px;
    right: 22px;
  }

  .title-box h1 {
    font-size: 2.05rem;
  }

  .title-box p {
    font-size: 1.35rem;
  }
}

/* DEBUG MODE */
/* Change body class to "debug" if you want to see clickable zones */
body.debug .zone::before {
  opacity: 1;
  border: 3px solid rgba(122,233,199,0.7);
}
</style>
</head>

<body>

<div class="world">
  <img src="assets/world.png" alt="Wrong Way Dogz Art World" class="world-image" />

  <div class="vignette"></div>
  <div class="scanlines"></div>

  <section class="title-box">
    <h1>WRONG WAY<br>DOGZ ART</h1>
    <p>A world is forming...</p>
  </section>

  <button class="menu-button" id="menuButton" aria-label="Open world menu">☰</button>

  <nav class="world-menu" id="worldMenu">
    <h2>WORLD MENU</h2>
    <a href="#">🌉 Bridge — Coming Soon</a>
    <a href="#">🌳 Treehouse — Coming Soon</a>
    <a href="#">🐾 LJ — Coming Soon</a>
    <a href="#">🐶 Daisy — Coming Soon</a>
    <a href="#">🎨 Art Archive — Coming Soon</a>
  </nav>

  <a href="#" class="zone bridge-zone"><span>Bridge Path</span></a>
  <a href="#" class="zone tree-zone"><span>Treehouse</span></a>
  <a href="#" class="zone lj-zone"><span>LJ</span></a>
  <a href="#" class="zone pixel-zone"><span>Pixel Guy</span></a>
  <a href="#" class="zone daisy-zone"><span>Daisy</span></a>
</div>

<script>
const menuButton = document.getElementById("menuButton");
const worldMenu = document.getElementById("worldMenu");

menuButton.addEventListener("click", () => {
  worldMenu.classList.toggle("open");
});
</script>

</body>
</html>
