<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wrong Way Dogz Art</title>

<style>
:root {
  --teal: #7ae9c7;
  --text: #effff9;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
}

/* WORLD */
.world {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.world-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ATMOSPHERE */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.6));
}

.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 2px
  );
}

/* TITLE */
.title-box {
  position: absolute;
  top: 20%;
  left: 10%;
  color: white;
}

.title-box h1 {
  letter-spacing: 0.2em;
  line-height: 1.1;
}

.title-box p {
  opacity: 0.8;
}

/* MENU BUTTON */
.menu-button {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  font-size: 1.6rem;
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.menu-button:hover {
  box-shadow: 0 0 12px var(--teal);
  transform: scale(1.05);
}

/* MENU PANEL */
.world-menu {
  position: absolute;
  top: 90px;
  right: 20px;
  width: 260px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 15px;
  opacity: 0;
  transform: translateY(-10px);
  transition: 0.25s;
}

.world-menu.open {
  opacity: 1;
  transform: translateY(0);
}

.world-menu h2 {
  margin-top: 0;
  font-size: 1.1rem;
}

.world-menu a {
  display: block;
  color: var(--text);
  text-decoration: none;
  padding: 10px 0;
  transition: 0.2s;
}

.world-menu a:hover {
  color: var(--teal);
  text-shadow: 0 0 6px var(--teal);
  transform: translateX(4px);
}

/* ZONES */
.zone {
  position: absolute;
  display: block;
}

.zone span {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: 0.2s;
  color: white;
}

.zone:hover span {
  opacity: 1;
}

/* subtle glow hotspots */
.zone::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(122,233,199,0.25);
  opacity: 0;
  transition: 0.3s;
}

.zone:hover::after {
  opacity: 1;
}

/* POSITION THESE BASED ON YOUR IMAGE */
.bridge-zone { top: 60%; left: 30%; width: 80px; height: 80px; }
.tree-zone { top: 25%; left: 55%; width: 90px; height: 90px; }
.lj-zone { top: 70%; left: 65%; width: 70px; height: 70px; }
.pixel-zone { top: 50%; left: 45%; width: 80px; height: 80px; }
.daisy-zone { top: 65%; left: 50%; width: 80px; height: 80px; }
</style>
</head>

<body>

<div class="world">
  <img src="assets/world.png" class="world-image" />

  <div class="vignette"></div>
  <div class="scanlines"></div>

  <section class="title-box">
    <h1>WRONG<br>WAY<br>DOGZ<br>ART</h1>
    <p>A world is forming...</p>
  </section>

  <button class="menu-button" id="menuButton">☰</button>

  <nav class="world-menu" id="worldMenu">
    <h2>WORLD MENU</h2>

    <a href="https://wrongwaydogz.gumroad.com/l/gyxyvi" target="_blank">
      🔥 Glitch Pack
    </a>

    <a href="https://wrongwaydogz.gumroad.com/subscribe" target="_blank">
      ⭐ Follow on Gumroad
    </a>

    <a href="http://www.redbubble.com/people/wrongwaydogzart" target="_blank">
      🛍️ Shop Merch
    </a>

    <a href="#">🌳 World Expanding...</a>
  </nav>

  <!-- CLICKABLE WORLD -->
  <a href="https://wrongwaydogz.gumroad.com/l/gyxyvi" target="_blank" class="zone pixel-zone">
    <span>Glitch Pack</span>
  </a>

  <a href="http://www.redbubble.com/people/wrongwaydogzart" target="_blank" class="zone bridge-zone">
    <span>Shop Merch</span>
  </a>

  <a href="https://wrongwaydogz.gumroad.com/subscribe" target="_blank" class="zone lj-zone">
    <span>Follow</span>
  </a>

</div>

<script>
const menuButton = document.getElementById("menuButton");
const worldMenu = document.getElementById("worldMenu");

menuButton.addEventListener("click", () => {
  worldMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!worldMenu.contains(e.target) && !menuButton.contains(e.target)) {
    worldMenu.classList.remove("open");
  }
});
</script>

</body>
</html>
