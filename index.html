<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* MAIN WORLD IMAGE */
.world-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
  user-select: none;
  -webkit-user-drag: none;
}

/* ATMOSPHERE */
.vignette {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.05), rgba(0,0,0,0.55)),
    linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.45));
}

/* SMALL LOGO BADGE */
.logo-badge {
  position: absolute;
  top: max(14px, env(safe-area-inset-top));
  left: 14px;
  z-index: 6;
  padding: 10px 14px;
  border-radius: 16px;
  background: rgba(0, 0, 0, 0.58);
  border: 1px solid rgba(122, 233, 199, 0.35);
  box-shadow: 0 0 20px rgba(122, 233, 199, 0.18);
  backdrop-filter: blur(6px);
}

.logo-badge h1 {
  font-size: 0.78rem;
  letter-spacing: 0.22em;
  line-height: 1.3;
  color: #effff9;
  text-shadow: 0 0 10px rgba(122,233,199,0.5);
}

.logo-badge p {
  margin-top: 4px;
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  opacity: 0.82;
}

/* MENU BUTTON */
.menu-button {
  position: absolute;
  top: max(14px, env(safe-area-inset-top));
  right: 14px;
  z-index: 8;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 1px solid rgba(122, 233, 199, 0.45);
  background: rgba(0, 0, 0, 0.62);
  color: #effff9;
  font-size: 1.4rem;
  cursor: pointer;
  box-shadow: 0 0 18px rgba(122, 233, 199, 0.25);
}

/* MENU PANEL */
.menu-panel {
  position: absolute;
  top: calc(max(14px, env(safe-area-inset-top)) + 58px);
  right: 14px;
  z-index: 7;
  width: min(260px, calc(100vw - 28px));
  padding: 14px;
  border-radius: 18px;
  background: rgba(0, 0, 0, 0.72);
  border: 1px solid rgba(122, 233, 199, 0.35);
  box-shadow: 0 0 26px rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  display: none;
}

.menu-panel.open {
  display: block;
}

.menu-panel h2 {
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  margin-bottom: 12px;
  color: #a9f7dc;
}

.menu-link,
.sound-button {
  display: block;
  width: 100%;
  margin-bottom: 9px;
  padding: 11px 12px;
  border-radius: 12px;
  border: 1px solid rgba(122, 233, 199, 0.22);
  background: rgba(122, 233, 199, 0.08);
  color: #effff9;
  text-decoration: none;
  font-size: 0.9rem;
  text-align: left;
  cursor: pointer;
}

.menu-link:hover,
.sound-button:hover {
  background: rgba(122, 233, 199, 0.18);
}

/* CLICKABLE WORLD ZONES */
.zone {
  position: absolute;
  z-index: 4;
  border: 2px solid rgba(122, 233, 199, 0.55);
  border-radius: 26px;
  background: rgba(122, 233, 199, 0.08);
  box-shadow:
    0 0 16px rgba(122, 233, 199, 0.28),
    inset 0 0 18px rgba(122, 233, 199, 0.12);
  cursor: pointer;
  text-decoration: none;
  transition: 0.2s ease;
}

.zone:hover,
.zone:active {
  background: rgba(122, 233, 199, 0.16);
  box-shadow:
    0 0 28px rgba(122, 233, 199, 0.45),
    inset 0 0 22px rgba(122, 233, 199, 0.18);
  transform: scale(1.02);
}

.zone span {
  position: absolute;
  left: 12px;
  bottom: 10px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0,0,0,0.55);
  color: #effff9;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  opacity: 0;
  transition: 0.2s ease;
}

.zone:hover span,
.zone:active span {
  opacity: 1;
}

/* THREE TRUE WORLD ENTRANCES */
.treehouse-zone {
  left: 3%;
  top: 27%;
  width: 40%;
  height: 20%;
}

.bridge-zone {
  right: 3%;
  top: 34%;
  width: 51%;
  height: 27%;
}

.cave-zone {
  left: 25%;
  bottom: 15%;
  width: 38%;
  height: 18%;
}

/* BOTTOM SAFE NOTE */
.footer-note {
  position: absolute;
  left: 50%;
  bottom: max(16px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 5;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(0,0,0,0.48);
  border: 1px solid rgba(122,233,199,0.22);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  opacity: 0.82;
  white-space: nowrap;
}

/* MOBILE TUNING */
@media (max-width: 600px) {
  .logo-badge {
    max-width: 230px;
    padding: 9px 12px;
  }

  .logo-badge h1 {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
  }

  .logo-badge p {
    font-size: 0.6rem;
  }

  .treehouse-zone {
    left: 3%;
    top: 30%;
    width: 40%;
    height: 18%;
  }

  .bridge-zone {
    right: 3%;
    top: 36%;
    width: 51%;
    height: 25%;
  }

  .cave-zone {
    left: 25%;
    bottom: 16%;
    width: 38%;
    height: 17%;
  }

  .zone span {
    display: none;
  }
}
</style>
</head>

<body>
  <main class="world">

    <img src="assets/world.png" alt="Wrong Way Dogz Art world" class="world-image" />

    <div class="vignette"></div>

    <section class="logo-badge">
      <h1>WRONG WAY<br>DOGZ ART</h1>
      <p>A world is forming...</p>
    </section>

    <button class="menu-button" id="menuButton" aria-label="Open menu">☰</button>

    <nav class="menu-panel" id="menuPanel">
      <h2>WORLD MENU</h2>

      <a href="#" class="menu-link">🐾 LJ — Coming Soon</a>
      <a href="#" class="menu-link">🐕 Daisy — Coming Soon</a>
      <a href="#" class="menu-link">🎨 Art Archive — Coming Soon</a>
      <a href="#" class="menu-link">🌀 Side Apps — Coming Soon</a>

      <button class="sound-button" id="soundButton">🔊 Sound: Off</button>
    </nav>

    <!-- TRUE WORLD NAVIGATION ZONES -->
    <a href="#" class="zone treehouse-zone">
      <span>Treehouse</span>
    </a>

    <a href="#" class="zone bridge-zone">
      <span>Bridge</span>
    </a>

    <a href="#" class="zone cave-zone">
      <span>Cave</span>
    </a>

    <div class="footer-note">Tap the glowing paths</div>

    <audio id="bgAudio" loop>
      <source src="assets/forest.mp3" type="audio/mpeg" />
    </audio>

  </main>

<script>
const menuButton = document.getElementById("menuButton");
const menuPanel = document.getElementById("menuPanel");
const soundButton = document.getElementById("soundButton");
const bgAudio = document.getElementById("bgAudio");

let soundOn = false;

menuButton.addEventListener("click", () => {
  menuPanel.classList.toggle("open");
});

soundButton.addEventListener("click", async () => {
  if (!soundOn) {
    try {
      await bgAudio.play();
      soundOn = true;
      soundButton.textContent = "🔊 Sound: On";
    } catch (error) {
      soundButton.textContent = "🔇 Tap again to allow sound";
    }
  } else {
    bgAudio.pause();
    soundOn = false;
    soundButton.textContent = "🔊 Sound: Off";
  }
});
</script>

</body>
</html>
