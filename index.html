<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.world img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TITLE BOX */
.title-box {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  padding: 20px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  text-align: center;
}

/* ZONES */
.zone {
  position: absolute;
  border-radius: 20px;
  background: rgba(122,233,199,0.2);
  border: 2px solid rgba(122,233,199,0.6);
}

/* --- POSITION FIXES --- */

/* Treehouse */
.zone-tree {
  top: 38%;
  left: 12%;
  width: 120px;
  height: 120px;
}

/* Bridge */
.zone-bridge {
  top: 42%;
  right: 12%;
  width: 140px;
  height: 100px;
}

/* Daisy (left lower cave area) */
.zone-daisy {
  top: 58%;
  left: 8%;
  width: 120px;
  height: 140px;
}

/* Cave (center lower) */
.zone-cave {
  top: 70%;
  left: 30%;
  width: 120px;
  height: 120px;
}

/* LJ (right lower) */
.zone-lj {
  top: 60%;
  right: 10%;
  width: 120px;
  height: 140px;
}

/* BUTTONS */
.controls {
  position: absolute;
  bottom: 6%;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

button {
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  background: rgba(0,0,0,0.7);
  color: white;
}
</style>
</head>

<body>

<div class="world">
  <img src="assets/world.png" alt="world" />

  <div class="title-box">
    <h1>WRONG WAY DOGZ ART</h1>
    <p>A world is forming...</p>
  </div>

  <!-- ZONES -->
  <div class="zone zone-tree"></div>
  <div class="zone zone-bridge"></div>
  <div class="zone zone-daisy"></div>
  <div class="zone zone-cave"></div>
  <div class="zone zone-lj"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <button>Hide Zones</button>
    <button>Sound Off</button>
  </div>

</div>

</body>
</html>
