<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* MAIN IMAGE */
.world-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}

/* ATMOSPHERE (SMART LIGHTING) */
.vignette {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 42%, rgba(122,233,199,0.12), transparent 34%),
    radial-gradient(circle at 17% 48%, rgba(255,210,120,0.16), transparent 18%),
    radial-gradient(circle at 63% 28%, rgba(122,233,199,0.10), transparent 22%),
    radial-gradient(circle at 78% 58%, rgba(122,233,199,0.08), transparent 18%),
    linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.42));
}

/* LIGHT SCANLINES (VERY SUBTLE) */
.scanlines {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.07;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 1px,
    transparent 3px,
    transparent 6px
  );
}

/* TITLE */
.title-box {
  position: absolute;
  top: calc(24px + env(safe-area-inset-top));
  left: 24px;
  z-index: 10;
  width: min(70vw, 520px);
  padding: 24px 28px;
  border-radius: 28px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(122,233,199,0.25);
  backdrop-filter: blur(4px);
}

.title-box h1 {
  font-size: clamp(2rem, 6vw, 2.8rem);
  letter-spacing: 0.28em;
  line-height: 1.2;
  font-weight: 900;
}

.title-box p {
  margin-top: 14px;
  font-size: clamp(1.1rem, 3.5vw, 1.6rem);
  letter-spacing: 0.12em;
  opacity: 0.85;
}

/* MENU BUTTON (FIXED — CLEAN + INTENTIONAL) */
.menu-button {
  position: absolute;
  top: calc(24px + env(safe-area-inset-top));
  right: 24px;
  z-index: 12;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1px solid rgba(122,233,199,0.25);
  background: rgba(0,0,0,0.5);
  color: #effff9;
  font-size: 2.2rem;
  display: grid;
  place-items: center;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: all 0.2s ease;
}

.menu-button:hover {
  box-shadow: 0 0 18px rgba(122,233,199,0.4);
}

.menu-button:active {
  transform: scale(0.95);
}

/* MENU */
.world-menu {
  position: absolute;
  top: calc(110px + env(safe-area-inset-top));
  right: 24px;
  z-index: 11;
  width: min(70vw, 340px);
  padding: 20px;
  border-radius: 24px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(122,233,199,0.3);
  backdrop-filter: blur(6px);
  display: none;
}

.world-menu.open {
  display: block;
}

.world-menu h2 {
  color: #a9f7dc;
  font-size: 1.6rem;
  letter-spacing: 0.2em;
  margin-bottom: 12px;
}

.world-menu a {
  display: block;
  color: #effff9;
  text-decoration: none;
  font-size: 1.1rem;
  padding: 12px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* ZONES */
.zone {
  position: absolute;
  z-index: 6;
  border-radius: 34px;
  cursor: pointer;
}

.zone::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle at center, rgba(122,233,199,0.25), transparent 70%);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.zone:hover::before,
.zone:active::before {
  opacity: 1;
}

/* LABEL */
.zone span {
  position: absolute;
  left: 50%;
  bottom: -36px;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(122,233,199,0.3);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 0.8rem;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.zone:hover span,
.zone:active span {
  opacity: 1;
}

/* POSITIONS (UNCHANGED — YOUR ALIGNMENT WAS GOOD) */
.tree-zone {
  top: 43%;
  left: 4%;
  width: 39%;
  height: 18%;
}

.bridge-zone {
  top: 25%;
  left: 28%;
  width: 46%;
  height: 17%;
}

.pixel-zone {
  top: 49%;
  right: 3%;
  width: 48%;
  height: 28%;
}

.daisy-zone {
  bottom: 3%;
  left: 25%;
  width: 38%;
  height: 26%;
}

.lj-zone {
  top: 59%;
  left: 0%;
  width: 29%;
  height: 21%;
}

/* MOBILE */
@media (max-width: 600px) {
  .menu-button {
    width: 60px;
    height: 60px;
    font-size: 1.8rem;
  }

  .world-menu {
    top: 90px;
  }
}

/* DEBUG */
body.debug .zone::before {
  opacity: 1;
}
</style>
</head>

<body>

<div class="world">
  <img src="assets/world.png" class="world-image" />

  <div class="vignette"></div>
  <div class="scanlines"></div>

  <section class="title-box">
    <h1>WRONG WAY<br>DOGZ ART</h1>
    <p>A world is forming...</p>
  </section>

  <button class="menu-button" id="menuButton">☰</button>

  <nav class="world-menu" id="worldMenu">
    <h2>WORLD MENU</h2>
    <a href="#">🌉 Bridge — Coming Soon</a>
    <a href="#">🌳 Treehouse — Coming Soon</a>
    <a href="#">🐾 LJ — Coming Soon</a>
    <a href="#">🐶 Daisy — Coming Soon</a>
    <a href="#">🎨 Art Archive — Coming Soon</a>
  </nav>

  <a href="#" class="zone bridge-zone"><span>Bridge Path</span></a>
  <a href="#" class="zone tree-zone"><span>Treehouse</span></a>
  <a href="#" class="zone lj-zone"><span>LJ</span></a>
  <a href="#" class="zone pixel-zone"><span>Pixel Guy</span></a>
  <a href="#" class="zone daisy-zone"><span>Daisy</span></a>
</div>

<script>
const menuButton = document.getElementById("menuButton");
const worldMenu = document.getElementById("worldMenu");

menuButton.addEventListener("click", () => {
  worldMenu.classList.toggle("open");
});
</script>

</body>
</html>
