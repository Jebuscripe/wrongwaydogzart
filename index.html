<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wrong Way Dogz Art</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #000;
  color: #effff9;
}

/* WORLD */
.world {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* BACKGROUND IMAGE */
.world img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ATMOSPHERE */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6));
  z-index: 2;
}

/* FLICKER LIGHT */
.flicker {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 40% 60%, rgba(255,180,80,0.15), transparent 60%);
  animation: flicker 3s infinite;
  z-index: 3;
  pointer-events: none;
}

@keyframes flicker {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* TEAL ENERGY PULSE */
.tealPulse {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 60% 70%, rgba(0,255,200,0.08), transparent 60%);
  animation: pulse 4s infinite;
  z-index: 3;
  pointer-events: none;
}

@keyframes pulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}

/* DRIFT EFFECT */
.drift {
  position: absolute;
  inset: 0;
  background: linear-gradient(transparent, rgba(255,255,255,0.02), transparent);
  animation: drift 12s linear infinite;
  z-index: 3;
  pointer-events: none;
}

@keyframes drift {
  from { transform: translateY(-20%); }
  to { transform: translateY(20%); }
}

/* TITLE */
.title-box {
  position: absolute;
  top: 4%;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 25px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 5;
}

.title-box h1 {
  font-size: 18px;
  letter-spacing: 2px;
}

.title-box p {
  font-size: 12px;
  opacity: 0.7;
}

/* MENU BUTTON */
.menu-btn {
  position: absolute;
  top: 4%;
  right: 4%;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  z-index: 5;
}

/* MENU PANEL */
.menu {
  position: absolute;
  top: 80px;
  right: 20px;
  width: 260px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  display: none;
  z-index: 6;
}

.menu.active {
  display: block;
}

.menu h2 {
  margin-bottom: 10px;
  color: #7ae9c7;
}

.menu-item {
  margin: 10px 0;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
}

/* GUIDE TEXT */
.guide {
  position: absolute;
  bottom: 8%;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
  animation: fadeOut 6s forwards;
  z-index: 5;
}

@keyframes fadeOut {
  0% { opacity: 0.8; }
  80% { opacity: 0.8; }
  100% { opacity: 0; }
}

</style>
</head>

<body>

<div class="world">

  <!-- BACKGROUND -->
  <img src="assets/world.png" alt="world"/>

  <!-- EFFECTS -->
  <div class="vignette"></div>
  <div class="flicker"></div>
  <div class="tealPulse"></div>
  <div class="drift"></div>

  <!-- TITLE -->
  <div class="title-box">
    <h1>WRONG WAY DOGZ ART</h1>
    <p>A world is forming...</p>
  </div>

  <!-- MENU BUTTON -->
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <!-- MENU -->
  <div class="menu" id="menu">
    <h2>WORLD MENU</h2>

    <div class="menu-item" onclick="go('world.html')">🌍 Enter World</div>
    <div class="menu-item" onclick="go('apps.html')">🌀 Apps</div>
    <div class="menu-item" onclick="go('archive.html')">🎨 Archive</div>
    <div class="menu-item" onclick="go('lj.html')">🐾 LJ</div>
    <div class="menu-item" onclick="go('daisy.html')">🐕 Daisy</div>

    <div class="menu-item" onclick="toggleSound()" id="soundToggle">🔊 Sound: Off</div>
  </div>

  <!-- GUIDE -->
  <div class="guide">Tap the menu or explore the world</div>

</div>

<!-- AUDIO -->
<audio id="bgSound" loop>
  <source src="assets/forest.mp3" type="audio/mpeg">
</audio>

<script>

const menu = document.getElementById("menu");

function toggleMenu() {
  menu.classList.toggle("active");
}

/* NAVIGATION */
function go(page) {
  window.location.href = page;
}

/* SOUND */
let soundOn = false;
const audio = document.getElementById("bgSound");
const toggleBtn = document.getElementById("soundToggle");

function toggleSound() {
  if (!soundOn) {
    audio.play();
    toggleBtn.innerText = "🔊 Sound: On";
    soundOn = true;
  } else {
    audio.pause();
    toggleBtn.innerText = "🔇 Sound: Off";
    soundOn = false;
  }
}

</script>

</body>
</html>
