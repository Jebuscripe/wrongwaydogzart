<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* MAIN IMAGE */
.world-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}

/* ATMOSPHERE */
.vignette {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 42%, rgba(122,233,199,0.10), transparent 32%),
    radial-gradient(circle at 18% 46%, rgba(255,210,120,0.12), transparent 18%),
    radial-gradient(circle at 75% 62%, rgba(122,233,199,0.08), transparent 20%),
    linear-gradient(to bottom, rgba(0,0,0,0.12), rgba(0,0,0,0.35));
}

.scanlines {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.045;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 1px,
    transparent 3px,
    transparent 7px
  );
}

/* TITLE CARD */
.title-box {
  position: absolute;
  top: calc(18px + env(safe-area-inset-top));
  left: 18px;
  z-index: 10;
  width: min(58vw, 360px);
  padding: 18px 20px 20px;
  border-radius: 24px;
  background: rgba(0,0,0,0.48);
  border: 1px solid rgba(122,233,199,0.22);
  backdrop-filter: blur(4px);
}

.title-box h1 {
  font-size: clamp(1.65rem, 5.8vw, 2.5rem);
  letter-spacing: 0.22em;
  line-height: 1.22;
  font-weight: 900;
}

.title-box p {
  margin-top: 14px;
  font-size: clamp(1rem, 3.4vw, 1.35rem);
  letter-spacing: 0.12em;
  opacity: 0.86;
}

/* MENU BUTTON */
.menu-button {
  position: absolute;
  top: calc(26px + env(safe-area-inset-top));
  right: 18px;
  z-index: 13;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 1px solid rgba(122,233,199,0.28);
  background: rgba(0,0,0,0.58);
  color: #effff9;
  font-size: 2rem;
  display: grid;
  place-items: center;
  cursor: pointer;
  backdrop-filter: blur(4px);
}

.menu-button:active {
  transform: scale(0.96);
}

/* WORLD MENU */
.world-menu {
  position: absolute;
  top: calc(98px + env(safe-area-inset-top));
  right: 14px;
  z-index: 12;
  width: min(82vw, 330px);
  max-height: 68vh;
  overflow-y: auto;
  padding: 18px;
  border-radius: 24px;
  background: rgba(0,0,0,0.76);
  border: 1px solid rgba(122,233,199,0.28);
  backdrop-filter: blur(7px);
  display: none;
}

.world-menu.open {
  display: block;
}

.world-menu h2 {
  color: #a9f7dc;
  font-size: 1.35rem;
  letter-spacing: 0.18em;
  margin-bottom: 10px;
}

.world-menu a {
  display: block;
  color: #effff9;
  text-decoration: none;
  font-size: 1rem;
  line-height: 1.25;
  padding: 12px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.world-menu a:last-child {
  border-bottom: none;
}

/* CLICK ZONES */
.zone {
  position: absolute;
  z-index: 6;
  border-radius: 34px;
  cursor: pointer;
}

.zone::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle at center, rgba(122,233,199,0.24), transparent 70%);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.zone:hover::before,
.zone:active::before {
  opacity: 1;
}

.zone span {
  position: absolute;
  left: 50%;
  bottom: -34px;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.62);
  border: 1px solid rgba(122,233,199,0.28);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 0.78rem;
  white-space: nowrap;
  opacity: 0;
}

.zone:hover span,
.zone:active span {
  opacity: 1;
}

/* ZONE POSITIONS */
.tree-zone {
  top: 43%;
  left: 4%;
  width: 39%;
  height: 18%;
}

.bridge-zone {
  top: 25%;
  left: 28%;
  width: 46%;
  height: 17%;
}

.pixel-zone {
  top: 49%;
  right: 3%;
  width: 48%;
  height: 28%;
}

.daisy-zone {
  bottom: 3%;
  left: 25%;
  width: 38%;
  height: 26%;
}

.lj-zone {
  top: 59%;
  left: 0%;
  width: 29%;
  height: 21%;
}

/* MOBILE TUNING */
@media (max-width: 600px) {
  .title-box {
    top: calc(88px + env(safe-area-inset-top));
    left: 16px;
    width: 52vw;
    padding: 16px 16px 18px;
    border-radius: 22px;
  }

  .title-box h1 {
    font-size: 1.62rem;
    letter-spacing: 0.21em;
  }

  .title-box p {
    font-size: 1rem;
    line-height: 1.45;
  }

  .menu-button {
    top: calc(104px + env(safe-area-inset-top));
    right: 18px;
    width: 58px;
    height: 58px;
    font-size: 1.75rem;
  }

  .world-menu {
    top: calc(172px + env(safe-area-inset-top));
    right: 12px;
    width: 72vw;
    max-height: 58vh;
    padding: 16px;
  }

  .world-menu h2 {
    font-size: 1.15rem;
  }

  .world-menu a {
    font-size: 0.96rem;
    padding: 11px 4px;
  }
}

/* DEBUG MODE */
body.debug .zone::before {
  opacity: 1;
}
</style>
</head>

<body>

<div class="world">
  <img src="assets/world.png" class="world-image" alt="Wrong Way Dogz Art world" />

  <div class="vignette"></div>
  <div class="scanlines"></div>

  <section class="title-box">
    <h1>WRONG<br>WAY<br>DOGZ<br>ART</h1>
    <p>A world is forming...</p>
  </section>

  <button class="menu-button" id="menuButton" aria-label="Open world menu">☰</button>

  <nav class="world-menu" id="worldMenu">
    <h2>WORLD MENU</h2>
    <a href="#">🌉 Bridge — Coming Soon</a>
    <a href="#">🌳 Treehouse — Coming Soon</a>
    <a href="#">🐾 LJ — Coming Soon</a>
    <a href="#">🐶 Daisy — Coming Soon</a>
    <a href="#">🎨 Art Archive — Coming Soon</a>
  </nav>

  <a href="#" class="zone bridge-zone"><span>Bridge Path</span></a>
  <a href="#" class="zone tree-zone"><span>Treehouse</span></a>
  <a href="#" class="zone lj-zone"><span>LJ</span></a>
  <a href="#" class="zone pixel-zone"><span>Pixel Guy</span></a>
  <a href="#" class="zone daisy-zone"><span>Daisy</span></a>
</div>

<script>
const menuButton = document.getElementById("menuButton");
const worldMenu = document.getElementById("worldMenu");

menuButton.addEventListener("click", () => {
  worldMenu.classList.toggle("open");
});
</script>

</body>
</html>
