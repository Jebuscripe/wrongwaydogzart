<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrong Way Dogz Art</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    .world {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .world-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .scene-whisper {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.28);
      padding: 8px 14px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .hotspot {
      position: absolute;
      z-index: 3;
      background: rgba(0, 255, 200, 0.0);
      border: 2px solid rgba(0, 255, 200, 0.0);
      border-radius: 18px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .hotspot:active {
      transform: scale(0.98);
    }

    .hotspot-label {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0);
      font-size: 0.75rem;
      white-space: nowrap;
      transition: color 0.2s ease;
      pointer-events: none;
    }

    .show-hotspots .hotspot {
      background: rgba(0, 255, 200, 0.08);
      border-color: rgba(0, 255, 200, 0.28);
    }

    .show-hotspots .hotspot-label {
      color: rgba(255,255,255,0.82);
    }

    /* Approximate zones - tweak later */
    #zone-treehouse {
      top: 12%;
      left: 44%;
      width: 26%;
      height: 20%;
    }

    #zone-cave {
      top: 48%;
      left: 62%;
      width: 22%;
      height: 24%;
    }

    #zone-lj {
      top: 58%;
      left: 20%;
      width: 24%;
      height: 28%;
      border-radius: 30px;
    }

    .bottom-ui {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(92%, 480px);
    }

    .ui-btn {
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.48);
      color: #f4f4f4;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.95rem;
      backdrop-filter: blur(6px);
      cursor: pointer;
    }

    .ui-btn:active {
      transform: scale(0.98);
    }

    .scene-panel {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
    }

    .scene-panel.show {
      display: flex;
    }

    .scene-card {
      width: min(92%, 460px);
      background: rgba(10, 12, 16, 0.92);
      color: #f3f3f3;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }

    .scene-title {
      font-size: 1.3rem;
      color: #bdfcf2;
      margin-bottom: 12px;
    }

    .scene-text {
      line-height: 1.5;
      color: #e7e7e7;
      margin-bottom: 18px;
    }

    .scene-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .scene-btn {
      border: none;
      background: rgba(0,255,200,0.14);
      color: #eafffb;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .scene-btn.alt {
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="world" id="world">
    <img src="assets/world.png" alt="Wrong Way Dogz World" class="world-image">

    <div class="scene-whisper">explore the forming world</div>
    <div class="vignette"></div>

    <!-- Hotspots -->
    <button class="hotspot" id="zone-treehouse" aria-label="Treehouse Lab">
      <span class="hotspot-label">Treehouse Lab</span>
    </button>

    <button class="hotspot" id="zone-cave" aria-label="Cave Entrance">
      <span class="hotspot-label">Cave Entrance</span>
    </button>

    <button class="hotspot" id="zone-lj" aria-label="LJ Zone">
      <span class="hotspot-label">LJ / Chaos Trail</span>
    </button>

    <div class="bottom-ui">
      <button class="ui-btn" id="toggleHotspots">Show Zones</button>
      <button class="ui-btn" id="enterUnknown">Enter the Unknown</button>
    </div>

    <div class="scene-panel" id="scenePanel">
      <div class="scene-card">
        <div class="scene-title" id="sceneTitle">Unknown Signal</div>
        <div class="scene-text" id="sceneText">
          The world is responding, but the path is still forming.
        </div>
        <div class="scene-actions">
          <button class="scene-btn" id="sceneAction">Go Deeper</button>
          <button class="scene-btn alt" id="closeScene">Back to World</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const world = document.getElementById("world");
    const scenePanel = document.getElementById("scenePanel");
    const sceneTitle = document.getElementById("sceneTitle");
    const sceneText = document.getElementById("sceneText");
    const sceneAction = document.getElementById("sceneAction");
    const closeScene = document.getElementById("closeScene");
    const toggleHotspots = document.getElementById("toggleHotspots");
    const enterUnknown = document.getElementById("enterUnknown");

    let currentZone = "unknown";

    const zoneContent = {
      intro: {
        title: "The Unknown",
        text: "You stand at the edge of a forming world. Nothing explains itself yet. That is the point. Pick a direction and see what answers back.",
        action: "Choose a Path"
      },
      treehouse: {
        title: "Treehouse Lab",
        text: "Above the forest floor, the lab hums with unfinished experiments. Bottles glow. Wires crackle. This feels like a place where origin particles might be studied, shaped, or accidentally unleashed.",
        action: "Inspect the Lab"
      },
      cave: {
        title: "Cave Entrance",
        text: "The cave does not look fully hostile, but it does look aware. This is the kind of place that might hold hidden rooms, old signals, buried paths, or truths that only appear in certain states of the world.",
        action: "Enter the Cave"
      },
      lj: {
        title: "LJ's Chaos Trail",
        text: "Where LJ goes, ordinary rules get a little less reliable. A trail like this could become your playful discovery path: hidden interactions, surprise warps, weird collectibles, or secret shortcuts nobody gets told about.",
        action: "Follow LJ"
      }
    };

    function openScene(zoneKey) {
      currentZone = zoneKey;
      sceneTitle.textContent = zoneContent[zoneKey].title;
      sceneText.textContent = zoneContent[zoneKey].text;
      sceneAction.textContent = zoneContent[zoneKey].action;
      scenePanel.classList.add("show");
    }

    document.getElementById("zone-treehouse").addEventListener("click", () => openScene("treehouse"));
    document.getElementById("zone-cave").addEventListener("click", () => openScene("cave"));
    document.getElementById("zone-lj").addEventListener("click", () => openScene("lj"));
    enterUnknown.addEventListener("click", () => openScene("intro"));

    closeScene.addEventListener("click", () => {
      scenePanel.classList.remove("show");
    });

    sceneAction.addEventListener("click", () => {
      if (currentZone === "treehouse") {
        sceneText.textContent = "Future version: this could open a lab interior scene, a crafting system, lore notes, or a device that shifts the world into a charged state.";
      } else if (currentZone === "cave") {
        sceneText.textContent = "Future version: this could transition into a deeper cave map with branching rooms, hidden doors, and unstable glitch routes.";
      } else if (currentZone === "lj") {
        sceneText.textContent = "Future version: this could trigger a playful chaos area, BarkToons entrance, or an unpredictable hidden route.";
      } else {
        sceneText.textContent = "Future version: the world hub expands as more scenes, apps, and hidden paths are connected.";
      }

      sceneAction.textContent = "More Soon";
    });

    toggleHotspots.addEventListener("click", () => {
      world.classList.toggle("show-hotspots");
      toggleHotspots.textContent = world.classList.contains("show-hotspots")
        ? "Hide Zones"
        : "Show Zones";
    });
  </script>
</body>
</html>
