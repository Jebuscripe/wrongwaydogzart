<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wrong Way Dogz Art</title>

<style>
:root {
  --gold: #d8b46a;
  --text: #fff7df;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia, serif;
  background: #000;
  color: var(--text);
}

.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  background-image: url("assets/images/welcome.png");
  background-size: cover;
  background-position: center;
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 55%, rgba(0,0,0,0.65));
  pointer-events: none;
}

.audio-btn,
.menu-btn {
  position: absolute;
  top: 18px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.25);
  color: var(--text);
  font-size: 1.4rem;
  border-radius: 10px;
  width: 48px;
  height: 48px;
  cursor: pointer;
}

.audio-btn {
  left: 18px;
}

.menu-btn {
  right: 18px;
}

.enter {
  position: absolute;
  left: 50%;
  bottom: 115px;
  transform: translateX(-50%);
  color: var(--text);
  text-decoration: none;
  font-size: clamp(1.4rem, 4vw, 2.4rem);
  letter-spacing: 0.12em;
  text-shadow: 0 3px 12px #000;
}

.nav-bar {
  position: absolute;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  width: min(900px, 92vw);
  display: flex;
  justify-content: space-around;
  align-items: center;
  gap: 8px;
  padding: 14px 10px;
  background: rgba(20, 12, 6, 0.78);
  border: 1px solid rgba(216,180,106,0.35);
  border-radius: 12px;
  backdrop-filter: blur(4px);
}

.nav-bar a {
  color: var(--gold);
  text-decoration: none;
  font-size: clamp(0.75rem, 2.5vw, 1rem);
  text-align: center;
}

.nav-bar a:hover,
.enter:hover {
  color: white;
  text-shadow: 0 0 10px var(--gold);
}

.menu {
  position: absolute;
  top: 80px;
  right: 18px;
  width: 240px;
  padding: 14px;
  background: rgba(0,0,0,0.72);
  border: 1px solid rgba(216,180,106,0.35);
  border-radius: 12px;
  display: none;
}

.menu.open {
  display: block;
}

.menu a {
  display: block;
  color: var(--text);
  text-decoration: none;
  padding: 10px 0;
}
</style>
</head>

<body>

<main class="hero">
  <div class="vignette"></div>

  <button class="audio-btn" id="audioBtn">🔇</button>
  <button class="menu-btn" id="menuBtn">☰</button>

  <nav class="menu" id="menu">
    <a href="https://wrongwaydogz.gumroad.com/l/gyxyvi" target="_blank">🔥 Glitch Pack</a>
    <a href="https://wrongwaydogz.gumroad.com/subscribe" target="_blank">⭐ Follow on Gumroad</a>
    <a href="http://www.redbubble.com/people/wrongwaydogzart" target="_blank">🛍️ Shop Merch</a>
  </nav>

  <a class="enter" href="#">CLICK TO ENTER</a>

  <nav class="nav-bar">
    <a href="#">📖<br>Stories</a>
    <a href="#">🎨<br>Art Gallery</a>
    <a href="#">🐾<br>Enter</a>
    <a href="#">📰<br>Wood Post</a>
    <a href="http://www.redbubble.com/people/wrongwaydogzart" target="_blank">🛍️<br>Shop</a>
  </nav>

  <audio id="ambience" loop>
    <source src="assets/audio/WWDA_morning_ambience.mp3" type="audio/mpeg">
  </audio>
</main>

<script>
const menuBtn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const audioBtn = document.getElementById("audioBtn");
const ambience = document.getElementById("ambience");

menuBtn.addEventListener("click", () => {
  menu.classList.toggle("open");
});

audioBtn.addEventListener("click", async () => {
  if (ambience.paused) {
    ambience.volume = 0.18;
    await ambience.play();
    audioBtn.textContent = "🔊";
  } else {
    ambience.pause();
    audioBtn.textContent = "🔇";
  }
});
</script>

</body>
</html>
