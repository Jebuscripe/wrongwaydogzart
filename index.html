<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrong Way Dogz Art</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #effff9;
    }

    .world {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .world-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.45) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.45));
    }

    .title-card {
      position: absolute;
      top: 4vh;
      left: 50%;
      transform: translateX(-50%);
      width: min(88vw, 720px);
      padding: 22px 24px;
      text-align: center;
      z-index: 3;
      border: 1px solid rgba(122, 233, 199, 0.35);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      box-shadow: 0 0 22px rgba(122, 233, 199, 0.16);
      backdrop-filter: blur(4px);
    }

    .title-card h1 {
      font-size: clamp(1.45rem, 5vw, 2.35rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(122, 233, 199, 0.65);
    }

    .title-card p {
      margin-top: 10px;
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    .hotspot {
      position: absolute;
      z-index: 4;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid rgba(122, 233, 199, 0);
      background: rgba(122, 233, 199, 0);
      cursor: pointer;
    }

    .hotspot::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: rgba(122, 233, 199, 0);
      box-shadow: 0 0 0 rgba(122, 233, 199, 0);
      transition: 0.25s ease;
    }

    .show-hotspots .hotspot {
      border-color: rgba(122, 233, 199, 0.55);
      background: rgba(122, 233, 199, 0.12);
      box-shadow: 0 0 18px rgba(122, 233, 199, 0.35);
    }

    .show-hotspots .hotspot::after {
      background: rgba(122, 233, 199, 0.7);
      box-shadow: 0 0 18px rgba(122, 233, 199, 0.9);
    }

    .hotspot-label {
      position: absolute;
      left: 50%;
      top: 78px;
      transform: translateX(-50%);
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(122, 233, 199, 0.35);
      color: #effff9;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      opacity: 0;
      white-space: nowrap;
      pointer-events: none;
    }

    .show-hotspots .hotspot-label {
      opacity: 1;
    }

    #zone-treehouse { top: 24%; left: 18%; }
    #zone-bridge { top: 34%; left: 54%; }
    #zone-lj { top: 63%; left: 5%; }
    #zone-daisey { top: 72%; left: 45%; }
    #zone-cave { top: 78%; left: 25%; }

    .message {
      position: absolute;
      left: 50%;
      bottom: 10vh;
      transform: translateX(-50%);
      z-index: 5;
      width: min(86vw, 680px);
      min-height: 74px;
      padding: 20px 22px;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(1.05rem, 4vw, 1.45rem);
      border-radius: 24px;
      border: 1px solid rgba(122, 233, 199, 0.45);
      background: rgba(0, 0, 0, 0.76);
      box-shadow: 0 0 24px rgba(122, 233, 199, 0.18);
    }

    .message.show { display: flex; }

    .bottom-ui {
      position: absolute;
      left: 50%;
      bottom: calc(6vh + 20px);
      transform: translateX(-50%);
      z-index: 6;
      display: flex;
      gap: 10px;
    }

    .ui-btn {
      padding: 10px 13px;
      border-radius: 999px;
      border: 1px solid rgba(122, 233, 199, 0.38);
      background: rgba(0, 0, 0, 0.72);
      color: #effff9;
      font-size: 0.86rem;
      cursor: pointer;
    }

    .ui-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>
  <main id="world" class="world">

    <img class="world-image" src="assets/world.png" />

    <div class="vignette"></div>

    <section class="title-card">
      <h1>Wrong Way Dogz Art</h1>
      <p>A world is forming...</p>
    </section>

    <!-- HOTSPOTS -->
    <button id="zone-treehouse" class="hotspot" data-message="The treehouse is still waking up."></button>
    <button id="zone-bridge" class="hotspot" data-message="The bridge hums with teal energy."></button>
    <button id="zone-lj" class="hotspot" data-message="LJ found something glowing."></button>
    <button id="zone-daisey" class="hotspot" data-message="Daisey is guarding the path."></button>
    <button id="zone-cave" class="hotspot" data-message="The cave is sealed for now."></button>

    <div id="message" class="message"></div>

    <nav class="bottom-ui">
      <button id="toggleHotspots" class="ui-btn">Show Zones</button>
      <button id="audioToggle" class="ui-btn">Sound Off</button>
    </nav>

    <!-- FIXED AUDIO -->
    <audio id="bgAudio" src="assets/background.mp3" loop preload="auto"></audio>

  </main>

  <script>
    const world = document.getElementById("world");
    const toggleHotspots = document.getElementById("toggleHotspots");
    const message = document.getElementById("message");
    const audioToggle = document.getElementById("audioToggle");
    const bgAudio = document.getElementById("bgAudio");

    let messageTimer;
    let audioOn = false;

    function showMessage(text) {
      clearTimeout(messageTimer);
      message.textContent = text;
      message.classList.add("show");

      messageTimer = setTimeout(() => {
        message.classList.remove("show");
      }, 4000);
    }

    toggleHotspots.onclick = () => {
      world.classList.toggle("show-hotspots");
      toggleHotspots.textContent =
        world.classList.contains("show-hotspots") ? "Hide Zones" : "Show Zones";
    };

    document.querySelectorAll(".hotspot").forEach((spot) => {
      spot.onclick = () => showMessage(spot.dataset.message);
    });

    audioToggle.onclick = async () => {
      try {
        if (!audioOn) {
          await bgAudio.play();
          audioOn = true;
          audioToggle.textContent = "Sound Playing";
        } else {
          bgAudio.pause();
          audioOn = false;
          audioToggle.textContent = "Sound Off";
        }
      } catch {
        showMessage("Sound needs a tap to awaken.");
      }
    };
  </script>

</body>
</html>
