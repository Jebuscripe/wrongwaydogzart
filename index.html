<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.world img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TITLE PANEL */
.title-box {
  position: absolute;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 420px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  text-align: center;
}

.title-box h1 {
  font-size: 22px;
  letter-spacing: 6px;
}

.title-box p {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

/* ZONES */
.zone {
  position: absolute;
  border-radius: 25px;
  background: rgba(122,233,199,0.15);
  border: 2px solid rgba(122,233,199,0.5);
}

/* INDIVIDUAL POSITIONS (FIXED NON-OVERLAP) */

/* Treehouse (top-left) */
.zone-tree {
  top: 28%;
  left: 8%;
  width: 28%;
  height: 12%;
}

/* Bridge / upper middle */
.zone-bridge {
  top: 32%;
  right: 8%;
  width: 32%;
  height: 12%;
}

/* Cave (left lower, raised slightly) */
.zone-cave {
  bottom: 28%;
  left: 6%;
  width: 30%;
  height: 16%;
}

/* Lab / center bottom (no overlap now) */
.zone-lab {
  bottom: 18%;
  left: 40%;
  width: 28%;
  height: 12%;
}

/* Dog (right lower, lifted slightly) */
.zone-dog {
  bottom: 28%;
  right: 6%;
  width: 30%;
  height: 16%;
}

/* BUTTONS */
.controls {
  position: absolute;
  bottom: 8%;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

.btn {
  padding: 10px 18px;
  border-radius: 20px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 14px;
}
</style>
</head>

<body>

<div class="world">

  <img src="assets/world.png" alt="World" />

  <div class="title-box">
    <h1>WRONG WAY DOGZ ART</h1>
    <p>A world is forming...</p>
  </div>

  <!-- ZONES -->
  <div class="zone zone-tree"></div>
  <div class="zone zone-bridge"></div>
  <div class="zone zone-cave"></div>
  <div class="zone zone-lab"></div>
  <div class="zone zone-dog"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="btn">Hide Zones</div>
    <div class="btn">Sound Off</div>
  </div>

</div>

</body>
</html>
