
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrong Way Dogz Art</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;

    .world-image {

</head>

<body>

  <!-- FULL SCREEN WORLD IMAGE -->
  <img src="world.png" alt="Wrong Way World" class="world-image">

  <!-- OVERLAY TEXT -->
  <div class="overlay">

  </div>

</html>
