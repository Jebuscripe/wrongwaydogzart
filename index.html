<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
}

.world img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title-box {
  position: absolute;
  top: 4%;
  left: 50%;
  transform: translateX(-50%);
  width: 84%;
  max-width: 420px;
  padding: 18px 16px;
  border-radius: 22px;
  background: rgba(0,0,0,0.68);
  border: 1px solid rgba(122,233,199,0.25);
  backdrop-filter: blur(10px);
  text-align: center;
  z-index: 5;
}

.title-box h1 {
  font-size: clamp(20px, 6vw, 34px);
  letter-spacing: 7px;
  line-height: 1.55;
}

.title-box p {
  margin-top: 10px;
  font-size: clamp(14px, 4vw, 22px);
  letter-spacing: 3px;
  opacity: 0.9;
}

.zone {
  position: absolute;
  border-radius: 26px;
  background: rgba(122,233,199,0.22);
  border: 3px solid rgba(122,233,199,0.62);
  z-index: 4;
  cursor: pointer;
}

.zones-hidden .zone {
  background: transparent;
  border-color: transparent;
}

/* SAFE NON-OVERLAPPING MOBILE-FIRST ZONES */

.zone-tree {
  top: 37%;
  left: 8%;
  width: 30%;
  height: 11%;
}

.zone-bridge {
  top: 45%;
  right: 15%;
  width: 42%;
  height: 10%;
}

.zone-cave {
  top: 66%;
  left: 0%;
  width: 23%;
  height: 20%;
}

.zone-lab {
  top: 85%;
  left: 25%;
  width: 24%;
  height: 11%;
}

.zone-dog {
  top: 77%;
  right: 25%;
  width: 28%;
  height: 17%;
}

.controls {
  position: absolute;
  left: 0;
  right: 0;
  bottom: calc(24px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: center;
  gap: 28px;
  z-index: 10;
  pointer-events: auto;
}

.btn {
  min-width: 118px;
  padding: 13px 18px;
  border-radius: 24px;
  background: rgba(0,0,0,0.78);
  border: 1px solid rgba(122,233,199,0.35);
  color: #effff9;
  font-size: 18px;
  line-height: 1.15;
  text-align: center;
  box-shadow: 0 0 18px rgba(122,233,199,0.18);
}

@media (min-width: 700px) {
  .title-box {
    top: 5%;
  }

  .zone-tree {
    top: 36%;
    left: 12%;
    width: 22%;
    height: 12%;
  }

  .zone-bridge {
    top: 44%;
    right: 18%;
    width: 32%;
    height: 10%;
  }

  .zone-cave {
    top: 65%;
    left: 8%;
    width: 20%;
    height: 20%;
  }

  .zone-lab {
    top: 83%;
    left: 35%;
    width: 20%;
    height: 11%;
  }

  .zone-dog {
    top: 76%;
    right: 25%;
    width: 22%;
    height: 17%;
  }
}
</style>
</head>

<body>

<div class="world" id="world">

  <img src="assets/world.png" alt="Wrong Way Dogz Art world" />

  <div class="title-box">
    <h1>WRONG WAY<br>DOGZ ART</h1>
    <p>A world is forming...</p>
  </div>

  <div class="zone zone-tree" onclick="zoneTap('Treehouse')"></div>
  <div class="zone zone-bridge" onclick="zoneTap('Bridge')"></div>
  <div class="zone zone-cave" onclick="zoneTap('Cave')"></div>
  <div class="zone zone-lab" onclick="zoneTap('Lab')"></div>
  <div class="zone zone-dog" onclick="zoneTap('Daisy')"></div>

  <div class="controls">
    <button class="btn" onclick="toggleZones()">Hide<br>Zones</button>
    <button class="btn" onclick="toggleSound()">Sound<br>Off</button>
  </div>

</div>

<script>
let zonesVisible = true;
let soundOn = false;

function toggleZones() {
  zonesVisible = !zonesVisible;
  document.getElementById("world").classList.toggle("zones-hidden", !zonesVisible);
  event.currentTarget.innerHTML = zonesVisible ? "Hide<br>Zones" : "Show<br>Zones";
}

function toggleSound() {
  soundOn = !soundOn;
  event.currentTarget.innerHTML = soundOn ? "Sound<br>On" : "Sound<br>Off";
}

function zoneTap(name) {
  alert(name + " is forming...");
}
</script>

</body>
</html>
