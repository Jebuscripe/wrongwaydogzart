<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wrong Way Dogz Art</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #effff9;
    }

    .world {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .world-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.05), rgba(0,0,0,0.65)),
        linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.45));
    }

    .title-card {
      position: absolute;
      top: calc(7vh + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(84vw, 720px);
      padding: 26px 22px 28px;
      border-radius: 42px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(122, 233, 199, 0.35);
      box-shadow: 0 0 28px rgba(122, 233, 199, 0.12);
      text-align: center;
      z-index: 5;
      backdrop-filter: blur(5px);
    }

    .title-card h1 {
      font-size: clamp(2rem, 7vw, 4.2rem);
      line-height: 1.18;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
      color: #effff9;
      text-shadow: 0 0 16px rgba(190, 255, 235, 0.45);
      margin-bottom: 18px;
    }

    .title-card p {
      font-size: clamp(1.15rem, 4vw, 2rem);
      letter-spacing: 0.12em;
      color: rgba(239, 255, 249, 0.95);
    }

    .zone {
      position: absolute;
      z-index: 4;
      border: 2px solid rgba(122, 233, 199, 0.58);
      background: rgba(122, 233, 199, 0.13);
      box-shadow:
        0 0 20px rgba(122, 233, 199, 0.18),
        inset 0 0 22px rgba(122, 233, 199, 0.14);
      border-radius: 28px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .zone::after {
      content: "";
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(122, 233, 199, 0.5);
      box-shadow: 0 0 28px rgba(122, 233, 199, 0.8);
      pointer-events: none;
    }

    .zone:hover,
    .zone:active {
      transform: scale(1.03);
      background: rgba(122, 233, 199, 0.22);
      box-shadow:
        0 0 30px rgba(122, 233, 199, 0.35),
        inset 0 0 30px rgba(122, 233, 199, 0.22);
    }

    .zones-hidden .zone {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }

    .zones-hidden .zone::after {
      opacity: 0;
    }

    /* Safe non-overlapping mobile-friendly zones */
    .zone-treehouse {
      left: 8%;
      top: 31%;
      width: 30%;
      height: 11%;
      border-radius: 34px;
    }

    .zone-bridge {
      left: 43%;
      top: 39%;
      width: 42%;
      height: 10%;
      border-radius: 34px;
    }

    .zone-lj {
      left: 0%;
      top: 61%;
      width: 23%;
      height: 20%;
      border-radius: 30px;
    }

    .zone-cave {
      left: 25%;
      top: 80%;
      width: 22%;
      height: 11%;
      border-radius: 28px;
    }

    .zone-daisy {
      left: 48%;
      top: 72%;
      width: 27%;
      height: 17%;
      border-radius: 32px;
    }

    .bottom-ui {
      position: absolute;
      left: 50%;
      bottom: calc(42px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
      z-index: 8;
    }

    .bottom-ui button {
      min-width: 132px;
      padding: 13px 18px;
      border-radius: 28px;
      border: 1px solid rgba(122, 233, 199, 0.55);
      background: rgba(0, 0, 0, 0.68);
      color: #effff9;
      font-size: 1.05rem;
      line-height: 1.15;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(122, 233, 199, 0.14);
      backdrop-filter: blur(6px);
    }

    .bottom-ui button:active {
      transform: scale(0.96);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: calc(132px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 9;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(122, 233, 199, 0.45);
      color: #effff9;
      font-size: 0.95rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      text-align: center;
      max-width: 86vw;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 480px) {
      .title-card {
        top: calc(7vh + env(safe-area-inset-top));
        width: 84vw;
        padding: 24px 18px 26px;
        border-radius: 40px;
      }

      .title-card h1 {
        font-size: 2rem;
      }

      .title-card p {
        font-size: 1.15rem;
      }

      .bottom-ui {
        gap: 14px;
        bottom: calc(38px + env(safe-area-inset-bottom));
      }

      .bottom-ui button {
        min-width: 124px;
        padding: 12px 14px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <main class="world" id="world">
    <img class="world-image" src="assets/world.png" alt="Wrong Way Dogz Art world scene" />

    <div class="vignette"></div>

    <section class="title-card">
      <h1>WRONG WAY DOGZ ART</h1>
      <p>A world is forming...</p>
    </section>

    <button class="zone zone-treehouse" data-zone="Treehouse" aria-label="Treehouse zone"></button>
    <button class="zone zone-bridge" data-zone="Bridge" aria-label="Bridge zone"></button>
    <button class="zone zone-lj" data-zone="LJ" aria-label="LJ zone"></button>
    <button class="zone zone-cave" data-zone="Cave" aria-label="Cave zone"></button>
    <button class="zone zone-daisy" data-zone="Daisy" aria-label="Daisy zone"></button>

    <div class="bottom-ui">
      <button id="zoneToggle">Hide<br>Zones</button>
      <button id="soundToggle">Sound<br>Off</button>
    </div>

    <div class="toast" id="toast">Zone selected</div>

    <audio id="bgAudio" loop>
      <source src="assets/forest.mp3" type="audio/mpeg" />
    </audio>
  </main>

  <script>
    const world = document.getElementById("world");
    const zoneToggle = document.getElementById("zoneToggle");
    const soundToggle = document.getElementById("soundToggle");
    const toast = document.getElementById("toast");
    const bgAudio = document.getElementById("bgAudio");

    let zonesVisible = true;
    let soundPlaying = false;
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    document.querySelectorAll(".zone").forEach((zone) => {
      zone.addEventListener("click", () => {
        const zoneName = zone.dataset.zone;
        showToast(`${zoneName} area is forming...`);
      });
    });

    zoneToggle.addEventListener("click", () => {
      zonesVisible = !zonesVisible;
      world.classList.toggle("zones-hidden", !zonesVisible);
      zoneToggle.innerHTML = zonesVisible ? "Hide<br>Zones" : "Show<br>Zones";
    });

    soundToggle.addEventListener("click", async () => {
      try {
        if (!soundPlaying) {
          await bgAudio.play();
          soundPlaying = true;
          soundToggle.innerHTML = "Sound<br>Playing";
        } else {
          bgAudio.pause();
          soundPlaying = false;
          soundToggle.innerHTML = "Sound<br>Off";
        }
      } catch (error) {
        showToast("Tap again to start sound");
      }
    });
  </script>
</body>
</html>
