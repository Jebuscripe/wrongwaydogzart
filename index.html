<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wrong Way Dogz Art</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  color: #effff9;
}

.world {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* BACKGROUND */
.world img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TITLE PANEL */
.title-box {
  position: absolute;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 420px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  text-align: center;
}

.title-box h1 {
  font-size: 26px;
  letter-spacing: 4px;
}

.title-box p {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

/* ZONES BASE */
.zone {
  position: absolute;
  border: 2px solid rgba(122,233,199,0.6);
  border-radius: 20px;
  background: rgba(122,233,199,0.15);
}

/* INDIVIDUAL ZONES (NON-OVERLAPPING) */

/* TREE / TOP LEFT */
.zone-tree {
  top: 28%;
  left: 10%;
  width: 120px;
  height: 80px;
}

/* BRIDGE / TOP RIGHT */
.zone-bridge {
  top: 32%;
  right: 10%;
  width: 150px;
  height: 80px;
}

/* CAVE LEFT */
.zone-cave-left {
  bottom: 32%;
  left: 8%;
  width: 110px;
  height: 110px;
}

/* CAVE RIGHT (DAISY AREA) */
.zone-cave-right {
  bottom: 30%;
  right: 12%;
  width: 120px;
  height: 120px;
}

/* CENTER LOWER SMALL */
.zone-center {
  bottom: 22%;
  left: 40%;
  width: 90px;
  height: 70px;
}

/* BUTTONS */
.controls {
  position: absolute;
  bottom: 12%;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

.btn {
  padding: 10px 20px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
}

/* SAFE MOBILE OFFSET */
@media (max-height: 700px) {
  .controls {
    bottom: 16%;
  }
}
</style>
</head>

<body>

<div class="world">
  <img src="assets/world.png" alt="World">

  <div class="title-box">
    <h1>WRONG WAY DOGZ ART</h1>
    <p>A world is forming...</p>
  </div>

  <!-- ZONES -->
  <div class="zone zone-tree"></div>
  <div class="zone zone-bridge"></div>
  <div class="zone zone-cave-left"></div>
  <div class="zone zone-cave-right"></div>
  <div class="zone zone-center"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="btn">Hide Zones</div>
    <div class="btn">Sound Off</div>
  </div>

</div>

</body>
</html>
