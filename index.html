<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrong Way Dogz Art</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    .world {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .world-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .scene-whisper {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.28);
      padding: 8px 14px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .hotspot {
      position: absolute;
      z-index: 3;
      background: rgba(0, 255, 200, 0.0);
      border: 2px solid rgba(0, 255, 200, 0.0);
      border-radius: 18px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .hotspot:active {
      transform: scale(0.98);
    }

    .hotspot-label {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0);
      font-size: 0.75rem;
      white-space: nowrap;
      transition: color 0.2s ease;
      pointer-events: none;
    }

    .show-hotspots .hotspot {
      background: rgba(0, 255, 200, 0.08);
      border-color: rgba(0, 255, 200, 0.28);
    }

    .show-hotspots .hotspot-label {
      color: rgba(255,255,255,0.82);
    }

    /* Approximate zones - tweak later */
    #zone-treehouse {
      top: 12%;
      left: 12%;
      width: 34%;
      height: 22%;
    }

    #zone-cave {
      top: 66%;
      left: 22%;
      width: 22%;
      height: 20%;
    }

    #zone-lj {
      top: 66%;
      left: 46%;
      width: 22%;
      height: 24%;
      border-radius: 30px;
    }

    .bottom-ui {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(92%, 480px);
    }

    .ui-btn {
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.48);
      color: #f4f4f4;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.95rem;
