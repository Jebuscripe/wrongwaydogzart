<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrong Way Dogz Art</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #effff9;
    }

    .world {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .world-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.65));
    }

    .title-card {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      text-align: center;
      width: min(92vw, 560px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(122, 233, 199, 0.24);
      backdrop-filter: blur(6px);
      box-shadow: 0 0 24px rgba(122, 233, 199, 0.12);
    }

    .title-card h1 {
      font-size: clamp(1.25rem, 5vw, 2.1rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #effff9;
      text-shadow: 0 0 12px rgba(122, 233, 199, 0.55);
    }

    .title-card p {
      margin-top: 4px;
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: rgba(239, 255, 249, 0.86);
      letter-spacing: 0.06em;
    }

    .bottom-ui {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(92vw, 520px);
    }

    .ui-btn {
      border: 1px solid rgba(122, 233, 199, 0.32);
      background: rgba(0, 0, 0, 0.48);
      color: #effff9;
      padding: 11px 15px;
      border-radius: 999px;
      font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 18px rgba(122, 233, 199, 0.10);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .ui-btn:hover,
    .ui-btn:active {
      transform: scale(0.97);
      background: rgba(0, 0, 0, 0.68);
      border-color: rgba(122, 233, 199, 0.65);
    }

    .hotspot {
      position: absolute;
      z-index: 3;
      border-radius: 24px;
      background: rgba(122, 233, 199, 0);
      border: 2px solid rgba(122, 233, 199, 0);
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
    }

    .hotspot:active {
      transform: scale(0.98);
    }

    .show-hotspots .hotspot {
      background: rgba(122, 233, 199, 0.08);
      border-color: rgba(122, 233, 199, 0.35);
    }

    .hotspot-label {
      position: absolute;
      left: 50%;
      bottom: -26px;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0);
      pointer-events: none;
      transition: color 0.2s ease;
      text-shadow: 0 0 8px #000;
    }

    .show-hotspots .hotspot-label {
      color: rgba(255, 255, 255, 0.9);
    }

    #zone-treehouse {
      top: 12%;
      left: 12%;
      width: 34%;
      height: 24%;
    }

    #zone-cave {
      top: 60%;
      left: 13%;
      width: 31%;
      height: 24%;
    }

    #zone-lj {
      top: 58%;
      left: 50%;
      width: 35%;
      height: 30%;
      border-radius: 36px;
    }

    .message {
      position: absolute;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%);
      z-index: 6;
      width: min(88vw, 440px);
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(122, 233, 199, 0.35);
      color: #effff9;
      text-align: center;
      font-size: 0.95rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .message.show {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .title-card {
        top: 16px;
      }

      .bottom-ui {
        bottom: 18px;
      }

      .ui-btn {
        font-size: 0.86rem;
        padding: 10px 13px;
      }

      .message {
        bottom: 86px;
      }
    }
  </style>
</head>

<body>
  <main id="world" class="world">
    <img class="world-image" src="assets/world.png" alt="Wrong Way Dogz Art world" />

    <div class="vignette"></div>

    <section class="title-card">
      <h1>Wrong Way Dogz Art</h1>
      <p>A world is forming...</p>
    </section>

    <button id="zone-treehouse" class="hotspot" type="button" data-message="The treehouse is still waking up.">
      <span class="hotspot-label">Treehouse</span>
    </button>

    <button id="zone-cave" class="hotspot" type="button" data-message="The cave is sealed for now. Something is moving inside.">
      <span class="hotspot-label">Cave</span>
    </button>

    <button id="zone-lj" class="hotspot" type="button" data-message="Daisey is guarding the glowing path. She knows more than she’s saying.">
  <span class="hotspot-label">Daisey</span>
    </button>

    <div id="message" class="message"></div>

    <nav class="bottom-ui">
      <button id="toggleHotspots" class="ui-btn" type="button">Show Zones</button>
      <a class="ui-btn" href="cave.html">Enter Cave</a>
      <button id="audioToggle" class="ui-btn" type="button">Sound Off</button>
    </nav>

    <audio id="bgAudio" src="assets/background.mp3" loop></audio>
  </main>

  <script>
    const world = document.getElementById("world");
    const toggleHotspots = document.getElementById("toggleHotspots");
    const message = document.getElementById("message");
    const audioToggle = document.getElementById("audioToggle");
    const bgAudio = document.getElementById("bgAudio");

    let messageTimer;
    let audioOn = false;

    toggleHotspots.addEventListener("click", () => {
      world.classList.toggle("show-hotspots");
      toggleHotspots.textContent = world.classList.contains("show-hotspots")
        ? "Hide Zones"
        : "Show Zones";
    });

    document.querySelectorAll(".hotspot").forEach((spot) => {
      spot.addEventListener("click", () => {
        const text = spot.dataset.message || "Something stirs...";
        showMessage(text);
      });
    });

    function showMessage(text) {
      clearTimeout(messageTimer);
      message.textContent = text;
      message.classList.add("show");

      messageTimer = setTimeout(() => {
        message.classList.remove("show");
      }, 2600);
    }

    audioToggle.addEventListener("click", async () => {
      try {
        if (!audioOn) {
          await bgAudio.play();
          audioOn = true;
          audioToggle.textContent = "Sound On";
        } else {
          bgAudio.pause();
          audioOn = false;
          audioToggle.textContent = "Sound Off";
        }
      } catch (error) {
        showMessage("Tap again to wake the sound.");
      }
    });
  </script>
</body>
</html>
